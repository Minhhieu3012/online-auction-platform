<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đấu Giá Trực Tiếp | BrosGem</title>

    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/collections.css" />
</head>
<body>
    <div class="app-shell">
        <div data-site-header data-base-path=".." data-active-page="live-auctions"></div>

        <main class="collections-page">
            <section class="collections-hero">
                <div>
                    <p class="eyebrow">Độc Quyền Tinh Tuyển</p>
                    <h1>Đấu Giá Trực Tiếp</h1>
                </div>

                <div class="collections-hero-meta">
                    <span data-result-count>Tìm thấy 0 lô</span>
                    <span class="meta-divider"></span>
                    <span>
                        <span>Sắp xếp theo:</span>
                        <strong data-current-sort>Sắp Kết Thúc</strong>
                    </span>
                </div>
            </section>

            <section class="collections-toolbar" aria-label="Bộ lọc đấu giá">
                <div class="toolbar-left">
                    <div class="category-trigger">
                        <span class="category-icon">≡</span>
                        <label for="categoryFilter">Danh mục</label>
                        <select id="categoryFilter" class="toolbar-select" data-category-filter>
                            <option value="all">Tất Cả Danh Mục</option>
                            <option value="horology">Đồng hồ (Horology)</option>
                            <option value="fine-art">Nghệ thuật (Fine Art)</option>
                            <option value="automotive">Ô tô (Automotive)</option>
                            <option value="jewelry">Trang sức (Jewelry)</option>
                            <option value="collectibles">Đồ sưu tầm (Collectibles)</option>
                        </select>
                    </div>

                    <div class="status-tabs" role="tablist" aria-label="Bộ lọc trạng thái đấu giá">
                        <button type="button" class="status-tab" data-status-filter="all">Tất cả</button>
                        <button type="button" class="status-tab is-active" data-status-filter="active">Đang Mở</button>
                        <button type="button" class="status-tab" data-status-filter="scheduled">Đã Lên Lịch</button>
                        <button type="button" class="status-tab" data-status-filter="closing">Sắp Đóng</button>
                        <button type="button" class="status-tab" data-status-filter="ended">Đã Kết Thúc</button>
                    </div>
                </div>

                <div class="toolbar-right">
                    <label class="search-box" for="auctionSearch">
                        <span>⌕</span>
                        <input
                            id="auctionSearch"
                            type="search"
                            placeholder="Tìm kiếm vật phẩm cụ thể..."
                            autocomplete="off"
                            data-search-input
                        />
                    </label>

                    <select class="sort-select" data-sort-select aria-label="Sắp xếp phiên đấu giá">
                        <option value="ending-soon">Sắp Kết Thúc</option>
                        <option value="highest-bid">Giá Cao Nhất</option>
                        <option value="newest">Mới Nhất</option>
                        <option value="most-bids">Nhiều Lượt Giá Nhất</option>
                    </select>
                </div>
            </section>

            <section class="collections-content">
                <div class="collections-grid" data-auction-grid></div>

                <div class="empty-state" data-empty-state hidden>
                    <span class="empty-state-icon">◇</span>
                    <h2>Không có lô nào khớp với tìm kiếm của bạn</h2>
                    <p>Hãy thử một từ khóa, danh mục hoặc trạng thái đấu giá khác.</p>
                    <button type="button" class="button button-outline" data-reset-filters>
                        Đặt Lại Bộ Lọc
                    </button>
                </div>

                <div class="load-more-area">
                    <p class="load-more-label" data-showing-label>Đang hiển thị 0 / 0 lô</p>
                    <button type="button" class="button button-outline load-more-button" data-load-more>
                        <span>Tải Thêm Bộ Sưu Tập</span>
                        <span>⌄</span>
                    </button>
                </div>
            </section>
        </main>

        <div data-site-footer data-base-path=".."></div>
    </div>

    <script type="module" src="../components/site-header.js"></script>
    <script type="module" src="../components/site-footer.js"></script>
    <script type="module" src="../js/modules/auction-list.js"></script>
</body>
</html>
