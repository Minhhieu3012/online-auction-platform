version: '3.8'

services:
  # ==========================================
  # 1. DATABASE (MySQL 8.0)
  # ==========================================
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DB:-auction_db}
    # Port 3307 ở máy host map vào 3306 của container để tránh trùng lặp
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Map file init để tự tạo 6 bảng (bao gồm bảng Fraud_Alerts của AI)
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - auction-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ==========================================
  # 2. CACHE (Redis)
  # ==========================================
  redis-cache:
    image: redis:7-alpine
    container_name: redis-cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - auction-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ==========================================
  # 3. MESSAGE BROKER (Kafka KRaft Mode - No Zookeeper)
  # ==========================================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms512M"
      # 👇 CẤU HÌNH HỘP ĐEN KAFKA (RETENTION 7 NGÀY - MỤC 3 GIAI ĐOẠN 3)
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - auction-network
    healthcheck:
      test: ["CMD", "kafka-cluster", "cluster-id", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ==========================================
  # 4. KAFKA UI (Công cụ giám sát Real-time cho Developer)
  # ==========================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kraft
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - auction-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ==========================================
  # 5. AI SERVICE (FastAPI)
  # ==========================================
  ai-logic:
    build:
      context: . # Sửa thành "." vì file docker-compose.yml đã nằm trong thư mục ai-features
      dockerfile: Dockerfile
    image: ai-logic-image:v1
    container_name: ai-logic
    user: "0:0" # Chạy quyền root trong container để tránh lỗi permission khi mount volume
    restart: on-failure
    ports:
      - "8000:8000"
    volumes:
      - .:/app # Sửa đường dẫn mount để lấy chính xác code từ thư mục hiện tại
    environment:
      - MYSQL_HOST=mysql-db
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-root}
      - MYSQL_DB=${MYSQL_DB:-auction_db}
      - REDIS_HOST=redis-cache
      - KAFKA_BROKER=kafka:29092
    depends_on:
      mysql-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - auction-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

# ==========================================
# KHAI BÁO MẠNG VÀ Ổ ĐĨA DÙNG CHUNG
# ==========================================
networks:
  auction-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  kafka_data: