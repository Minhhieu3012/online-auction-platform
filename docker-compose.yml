services:
  # 1. Database: MySQL 8.0
  mysql-db:
    image: mysql:8.0
    container_name: auction_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - auction-network

  # 2. Cache: Redis
  redis-cache:
    image: redis:7.0-alpine
    container_name: auction_redis
    ports:
      - "6379:6379"
    networks:
      - auction-network

  # 3. Zookeeper (Confluent)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: auction_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - auction-network

  # 4. Kafka (Confluent)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: auction_kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,LISTENER_EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,LISTENER_EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - auction-network

  # 5. AI Service (Thành)
  ai-service:
    build:
      context: ./ai-features
      dockerfile: Dockerfile
    container_name: ai_service
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    volumes:
      - ./ai-features:/app
    environment:
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql-db/${MYSQL_DATABASE}
      - REDIS_URL=redis://redis-cache:6379/0
      - KAFKA_BROKERS=kafka:29092
    depends_on:
      - mysql-db
      - kafka
      - redis-cache
    networks:
      - auction-network

networks:
  auction-network:
    driver: bridge

volumes:
  mysql_data: